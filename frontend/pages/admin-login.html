<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دخول الإدارة — شفاء ديزاد</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem 1rem; background:linear-gradient(135deg,#0f172a,#1e293b); }
    .auth-card  { background:white; border-radius:var(--radius-xl); padding:2.5rem 2rem; width:100%; max-width:400px; box-shadow:0 25px 60px rgba(0,0,0,.4); }
    .auth-logo  { text-align:center; margin-bottom:2rem; }
    .auth-logo a { text-decoration:none; font-size:1.5rem; font-weight:900; color:var(--text); }
    .auth-logo span { color:var(--primary); }
    .admin-badge { display:inline-flex; align-items:center; gap:.4rem; background:#fef3c7; color:#92400e; border-radius:999px; padding:.3rem 1rem; font-size:.8rem; font-weight:800; margin-bottom:1.25rem; }
    .auth-title { font-size:1.3rem; font-weight:900; text-align:center; margin-bottom:.3rem; }
    .auth-sub   { font-size:.875rem; color:var(--muted); text-align:center; margin-bottom:1.75rem; }
    .error-msg  { background:var(--red-light); color:var(--red); border-radius:var(--radius); padding:.75rem 1rem; font-size:.875rem; margin-bottom:1rem; display:none; }
    .error-msg.show { display:block; }
    .back-link  { display:block; text-align:center; margin-top:1rem; font-size:.85rem; color:var(--muted); text-decoration:none; }
    .back-link:hover { color:var(--primary); }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="../index.html">شفاء<span>ديزاد</span></a>
    </div>
    <div style="text-align:center;margin-bottom:1.25rem">
      <span class="admin-badge">🛡️ لوحة الإدارة</span>
    </div>
    <h2 class="auth-title">دخول المدير</h2>
    <p class="auth-sub">هذه الصفحة مخصصة للمديرين فقط</p>

    <div class="error-msg" id="admin-error"></div>
    <form id="admin-login-form">
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني</label>
        <input type="email" id="a-email" class="input" required placeholder="admin@shifaa-dz.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <input type="password" id="a-password" class="input" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem;background:#0f172a;border-color:#0f172a" id="admin-btn">دخول الإدارة</button>
    </form>
    <a href="login.html" class="back-link">← العودة لتسجيل دخول المستخدمين</a>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth-redirects.js"></script>
<script src="../js/main.js"></script>
<script>
document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('admin-error');
  errEl.classList.remove('show');
  const btn = document.getElementById('admin-btn');
  btn.disabled = true; btn.textContent = 'جارٍ التحقق...';
  try {
    const data = await api.post('/auth/login.php', {
      email:    document.getElementById('a-email').value,
      password: document.getElementById('a-password').value,
    });
    if (data.role !== 'admin') {
      throw new Error('هذا الحساب ليس حساب مدير');
    }
    localStorage.setItem('shifaa_user', JSON.stringify(data));
    showToast('مرحباً بالمدير!', 'success');
    setTimeout(() => { window.location.href = 'admin/dashboard.html'; }, 700);
  } catch (err) {
    errEl.textContent = err.message || 'خطأ في تسجيل الدخول';
    errEl.classList.add('show');
    btn.disabled = false; btn.textContent = 'دخول الإدارة';
  }
});
</script>
</body>
</html>
