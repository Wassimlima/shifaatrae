<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الصيدلية — شفاء ديزاد</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link rel="stylesheet" href="../../css/pro-dashboard.css">
  <style>
    body { background:var(--muted-bg); }
    .pro-layout { display:flex; min-height:100vh; }
    .pro-sidebar { width:240px; background:var(--sidebar); color:var(--sidebar-fg); padding:1.5rem 1rem; flex-shrink:0; display:flex; flex-direction:column; gap:.35rem; }
    .pro-sidebar .brand { font-size:1.1rem; font-weight:900; margin-bottom:1.25rem; padding:.5rem; color:white; }
    .pro-sidebar .brand span { color:var(--primary); }
    .pro-nav-item { display:flex; align-items:center; gap:.75rem; padding:.65rem .9rem; border-radius:var(--radius); color:rgba(255,255,255,.7); font-size:.875rem; font-weight:600; cursor:pointer; transition:all .2s; border:none; background:none; width:100%; text-align:right; position:relative; }
    .pro-nav-item:hover, .pro-nav-item.active { background:rgba(255,255,255,.12); color:white; }
    .pro-main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .pro-topbar { background:white; border-bottom:1px solid var(--border); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; }
    .pro-topbar h2 { font-size:1rem; font-weight:800; color:var(--text); }
    .pro-topbar-avatar { width:36px; height:36px; border-radius:50%; background:var(--primary); color:white; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:.9rem; }
    .pro-content { flex:1; padding:1.5rem; overflow-y:auto; }
    .stats-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:1rem; margin-bottom:1.5rem; }
    .stat-card { background:white; border:1.5px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem; }
    .stat-val  { font-size:1.6rem; font-weight:900; color:var(--primary); }
    .stat-lbl  { font-size:.8rem; color:var(--muted); margin-top:.2rem; }
    .tab-bar   { display:flex; gap:.5rem; margin-bottom:1.25rem; flex-wrap:wrap; }
    .tab-btn   { padding:.5rem 1rem; border:1.5px solid var(--border); border-radius:var(--radius); background:white; font-family:var(--font); font-size:.85rem; font-weight:700; cursor:pointer; transition:all .2s; position:relative; }
    .tab-btn.active { background:var(--primary); color:white; border-color:var(--primary); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .section-card { background:white; border:1.5px solid var(--border); border-radius:var(--radius-xl); padding:1.5rem; }
    .badge-dot { position:absolute; top:4px; left:4px; width:16px; height:16px; border-radius:50%; background:var(--red); color:white; font-size:.65rem; font-weight:900; display:none; align-items:center; justify-content:center; }
    .logout-btn { margin-top:auto; padding:.65rem .9rem; border-radius:var(--radius); color:rgba(255,255,255,.5); font-size:.85rem; font-weight:600; cursor:pointer; border:none; background:none; width:100%; text-align:right; display:flex; align-items:center; gap:.75rem; }
    .logout-btn:hover { color:white; background:rgba(255,0,0,.15); }
    @media (max-width:768px) { .pro-sidebar { display:none; } }
  </style>
</head>
<body>
<div class="pro-layout">
  <aside class="pro-sidebar">
    <div class="brand">شفاء<span>ديزاد</span></div>
    <button class="pro-nav-item active" data-tab="inventory" onclick="switchTab('inventory')">📦 المخزون</button>
    <button class="pro-nav-item" data-tab="partners" onclick="switchTab('partners')">🤝 الشراكات <span class="badge-dot" id="nav-partner-badge"></span></button>
    <button class="pro-nav-item" data-tab="resupply" onclick="switchTab('resupply')">🔄 طلبات التموين <span class="badge-dot" id="nav-resupply-badge"></span></button>
    <button class="logout-btn" onclick="logout()">🚪 تسجيل الخروج</button>
  </aside>

  <div class="pro-main">
    <div class="pro-topbar">
      <h2>لوحة تحكم الصيدلية</h2>
      <div style="display:flex;align-items:center;gap:.75rem">
        <div class="user-info" style="text-align:left"><strong></strong></div>
        <div class="pro-topbar-avatar user-avatar">ص</div>
      </div>
    </div>

    <div class="pro-content">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-val" id="st-total">--</div><div class="stat-lbl">إجمالي المنتجات</div></div>
        <div class="stat-card"><div class="stat-val" id="st-low" style="color:var(--orange)">--</div><div class="stat-lbl">مخزون منخفض</div></div>
        <div class="stat-card"><div class="stat-val" id="st-today">--</div><div class="stat-lbl">طلبات اليوم</div></div>
        <div class="stat-card"><div class="stat-val" id="st-rate">--</div><div class="stat-lbl">نسبة التوفر</div></div>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" data-tab="inventory" onclick="switchTab('inventory')">📦 المخزون</button>
        <button class="tab-btn" data-tab="partners" onclick="switchTab('partners')">🤝 الشراكات <span class="badge-dot" id="tab-partner-badge"></span></button>
        <button class="tab-btn" data-tab="resupply" onclick="switchTab('resupply')">🔄 طلبات التموين <span class="badge-dot" id="tab-resupply-badge"></span></button>
      </div>

      <!-- INVENTORY TAB -->
      <div id="panel-inventory" class="tab-panel active">
        <div class="section-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
            <h3 style="font-weight:800">قائمة المخزون</h3>
            <button class="btn btn-primary btn-sm" id="btn-add-item">+ إضافة منتج</button>
          </div>
          <div style="overflow-x:auto">
            <table style="width:100%;border-collapse:collapse;font-size:.875rem">
              <thead><tr style="border-bottom:1.5px solid var(--border)">
                <th style="padding:.6rem;text-align:right;font-weight:800">المنتج</th>
                <th style="padding:.6rem;text-align:right;font-weight:800">التصنيف</th>
                <th style="padding:.6rem;text-align:right;font-weight:800">الكمية</th>
                <th style="padding:.6rem;text-align:right;font-weight:800">السعر</th>
                <th style="padding:.6rem;text-align:right;font-weight:800">الحالة</th>
                <th style="padding:.6rem;text-align:right;font-weight:800">إجراء</th>
              </tr></thead>
              <tbody id="inventory-tbody">
                <tr><td colspan="6" style="text-align:center;padding:2rem"><div class="spinner"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- PARTNERSHIPS TAB -->
      <div id="panel-partners" class="tab-panel">
        <div class="section-card">
          <h3 style="font-weight:800;margin-bottom:1rem">الشراكات مع مزودي الأدوية</h3>
          <div id="partnerships-content"></div>
        </div>
      </div>

      <!-- RESUPPLY TAB -->
      <div id="panel-resupply" class="tab-panel">
        <div class="section-card">
          <h3 style="font-weight:800;margin-bottom:1rem">طلبات التموين الواردة</h3>
          <div id="resupply-content"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Inventory Modal -->
<div class="modal-overlay hidden" id="inv-modal">
  <div class="modal" style="max-width:480px;width:94%">
    <div class="modal-header">
      <h3 class="modal-title" id="inv-modal-title">إضافة منتج</h3>
      <button class="modal-close" data-modal-close="inv-modal">✕</button>
    </div>
    <div class="modal-body">
      <form id="inv-form">
        <div class="form-group">
          <label class="form-label">اسم المنتج *</label>
          <input type="text" id="f-product-name" class="input" required placeholder="اسم الدواء أو المنتج">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
          <div class="form-group">
            <label class="form-label">الكمية *</label>
            <input type="number" id="f-qty" class="input" required min="0" value="1">
          </div>
          <div class="form-group">
            <label class="form-label">السعر (دج)</label>
            <input type="number" id="f-price" class="input" min="0" step="0.01" placeholder="0.00">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
          <div class="form-group">
            <label class="form-label">التصنيف *</label>
            <select id="f-category" class="input">
              <option value="medicine">دواء</option>
              <option value="device">جهاز طبي</option>
              <option value="parapharmacy">شبه صيدلاني</option>
              <option value="other">أخرى</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">الحالة *</label>
            <select id="f-status" class="input">
              <option value="available">متوفر</option>
              <option value="limited">محدود</option>
              <option value="unavailable">غير متوفر</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">حفظ</button>
      </form>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="../../js/config.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/auth-redirects.js"></script>
<script src="../../js/main.js"></script>
<script>
(function() {
  try { var u = JSON.parse(localStorage.getItem('shifaa_user')); if (!u || u.role !== 'pharmacist') { window.location.replace('../login.html'); } } catch(e) { window.location.replace('../login.html'); }
})();

function switchTab(tab) {
  document.querySelectorAll('.tab-btn, .pro-nav-item').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('panel-' + tab);
  if (panel) panel.classList.add('active');
}

function logout() {
  api.post('/auth/logout.php', {}).catch(() => {});
  localStorage.removeItem('shifaa_user');
  window.location.href = '../login.html';
}

function formatDate(d) { try { return new Date(d).toLocaleDateString('ar-DZ', {year:'numeric',month:'short',day:'numeric'}); } catch { return d; } }
</script>
<script src="../../js/dashboard-pharmacy.js"></script>
</body>
</html>
